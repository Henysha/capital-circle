spring:
  datasource:
    url: jdbc:h2:mem:capitalcircle-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    expiration-minutes: 60
  cors:
    allowed-origins: http://localhost:5173
